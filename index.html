<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <title>8 Meg Stick Records</title>
</head>

<body>
    <div id="app-loader" class="app-loader" aria-live="polite" aria-label="Loading">
        <div class="app-loader__spinner"></div>
    </div>
    <div id="app" v-cloak>
        <nav class="site-nav">
            <a href="#" class="site-nav__logo" @click.prevent="scrollToTop">
                <img src="./images/8meglogo.svg" alt="8 Meg Stick Records">
            </a>
            <div
                class="artist-filter"
                :class="{ 'artist-filter--open': isFilterOpen }"
                ref="artistFilter"
            >
                <button
                    type="button"
                    class="artist-filter__trigger"
                    :class="filterTriggerClass"
                    :style="filterTriggerStyle"
                    @click="toggleFilter"
                    :aria-expanded="isFilterOpen"
                    aria-haspopup="listbox"
                >
                    <span class="artist-filter__label">{{ filterLabel }}</span>
                    <span class="artist-filter__chevron" aria-hidden="true"></span>
                </button>
                <ul class="artist-filter__menu" role="listbox" v-show="isFilterOpen">
                    <li role="option">
                        <button
                            type="button"
                            class="artist-filter__option artist-filter__option--all"
                            :class="{ 'artist-filter__option--selected': selectedArtist === 'All' }"
                            @click="selectArtist('All')"
                        >
                            All artists
                        </button>
                    </li>
                    <li v-for="artist in artists" :key="artist" role="option">
                        <button
                            type="button"
                            class="artist-filter__option artist-filter__animated-bg"
                            :class="{ 'artist-filter__option--selected': selectedArtist === artist }"
                            :style="artistOptionStyle(artist)"
                            @click="selectArtist(artist)"
                        >
                            {{ artist }}
                        </button>
                    </li>
                </ul>
            </div>
        </nav>

        <main class="releases">
            <section
                v-for="release in filteredReleases"
                :key="release.id"
                class="release-section"
                :data-release-id="release.id"
            >
                <div class="release-sticky">
                    <div
                        class="release-bg"
                        :class="{ 'release-bg--loaded': isCoverLoaded(release.id) }"
                        :style="isCoverLoaded(release.id) ? bgStyle(release) : null"
                    ></div>
                    <div class="release-content" :style="contentStyle(release.id)">
                        <p class="release-artist">{{ release.artist }}</p>
                        <h2 class="release-title">{{ release.title }}</h2>
                        <div class="release-cover-wrap" :style="revealStyle(release.id, 'cover')">
                            <div
                                v-if="isCoverLoaded(release.id) && !isCoverImageReady(release.id)"
                                class="release-cover-spinner"
                                aria-hidden="true"
                            ></div>
                            <img
                                v-show="isCoverLoaded(release.id)"
                                class="release-cover"
                                :class="{ 'release-cover--ready': isCoverImageReady(release.id) }"
                                :src="isCoverLoaded(release.id) ? release.cover : undefined"
                                :alt="`Cover for ${release.title}`"
                                @load="onCoverImageLoad(release.id)"
                                @error="onCoverImageLoad(release.id)"
                            >
                        </div>
                        <div class="release-links" :style="revealStyle(release.id, 'links')">
                            <a :href="release.spotify" class="release-links__item" target="_blank" rel="noopener">
                                <img src="./images/spotify.svg" alt="Spotify" class="streaming-link">
                            </a>
                            <a :href="release.apple" class="release-links__item" target="_blank" rel="noopener">
                                <img src="./images/applemusic.svg" alt="Apple Music" class="streaming-link">
                            </a>
                            <a :href="release.youtube" class="release-links__item" target="_blank" rel="noopener">
                                <img src="./images/youtubemusic.svg" alt="YouTube Music" class="streaming-link">
                            </a>
                            <a :href="release.deezer" class="release-links__item" target="_blank" rel="noopener">
                                <img src="./images/deezer.svg" alt="Deezer" class="streaming-link">
                            </a>
                            <a :href="release.tidal" class="release-links__item" target="_blank" rel="noopener">
                                <img src="./images/tidal.svg" alt="Tidal" class="streaming-link">
                            </a>
                            <a :href="release.amazon" class="release-links__item" target="_blank" rel="noopener">
                                <img src="./images/amazon.svg" alt="Amazon Music" class="streaming-link">
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="./javascript/getData.js"></script>
</body>

</html>
